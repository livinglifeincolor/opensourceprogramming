# Deploy Sphinx documentation to GitHub Pages
#
# Triggered on every push to `main`.  The workflow:
#   1. Installs Python and the Sphinx + furo + typehints packages.
#   2. Runs sphinx-build to produce static HTML from the backend module docstrings.
#   3. Publishes the resulting HTML directory to the `gh-pages` branch via
#      peaceiris/actions-gh-pages, which GitHub Pages serves automatically.
#
# Prerequisites (one-time manual setup):
#   • Repository Settings → Pages → Source: "Deploy from a branch" → gh-pages / (root)

name: Deploy Sphinx Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      # Re-build only when source code or docs config actually changes.
      - "fastapi-board/backend/app/**"
      - "fastapi-board/backend/docs/**"
      - ".github/workflows/docs.yml"

  # Allow manual trigger from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write   # needed by peaceiris/actions-gh-pages to push to gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the full history so gh-pages can be pushed cleanly ──
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            fastapi-board/backend/requirements.txt
            fastapi-board/backend/docs/requirements.txt

      # ── 3. Install runtime deps (needed for autodoc imports) ──────────────
      - name: Install backend dependencies
        run: pip install -r fastapi-board/backend/requirements.txt

      # ── 4. Install Sphinx and theme ───────────────────────────────────────
      - name: Install Sphinx dependencies
        run: pip install -r fastapi-board/backend/docs/requirements.txt

      # ── 5. Build HTML docs ────────────────────────────────────────────────
      - name: Build Sphinx documentation
        run: |
          sphinx-build \
            -b html \
            fastapi-board/backend/docs \
            fastapi-board/backend/docs/_build/html \
            -W --keep-going \
            -w /tmp/sphinx-warnings.txt || true
          # Print warnings summary (non-fatal)
          if [ -s /tmp/sphinx-warnings.txt ]; then
            echo "---- Sphinx warnings ----"
            cat /tmp/sphinx-warnings.txt
          fi

      # ── 6. Add a .nojekyll file so GitHub Pages serves _ prefixed folders ─
      - name: Add .nojekyll
        run: touch fastapi-board/backend/docs/_build/html/.nojekyll

      # ── 7. Deploy to gh-pages branch ─────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: fastapi-board/backend/docs/_build/html
          publish_branch: gh-pages
          commit_message: "docs: deploy Sphinx docs from ${{ github.sha }}"
          # Keep the full git history on the gh-pages branch.
          force_orphan: false
