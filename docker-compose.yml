services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: knu_open
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./my_profile
    ports:
      - "5001:5001"
    environment:
      FLASK_APP: app.py
      SECRET_KEY: dev-secret-key-change-in-prod
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: knu_open
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes:
      - ./my_profile:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  pgdata:
